function StockCard(){
  const {ar}=useLang();
  const [products,setProducts]=useState([]);
  const [selProduct,setSelProduct]=useState('');
  const [dateFrom,setDateFrom]=useState(new Date(new Date().getFullYear(),0,1).toISOString().split('T')[0]);
  const [dateTo,setDateTo]=useState(today());
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [showAdj,setShowAdj]=useState(false);
  const [adjQty,setAdjQty]=useState(1);
  const [adjType,setAdjType]=useState('in');
  const [adjReason,setAdjReason]=useState('');
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);

  useEffect(()=>{
    API.get('/inventory/products').then(r=>{
      const p=r.data||[];
      setProducts(p);
      if(p.length>0) setSelProduct(String(p[0].id));
    }).catch(()=>{});
  },[]);

  const load=()=>{
    if(!selProduct)return;
    setLoading(true);setData(null);
    API.get('/inventory/stock-card/'+selProduct+'?date_from='+dateFrom+'&date_to='+dateTo)
      .then(r=>setData(r.data))
      .catch(e=>setMsg({t:'e',m:e.response&&e.response.data&&e.response.data.detail||'Failed to load'}))
      .finally(()=>setLoading(false));
  };
  useEffect(()=>{if(selProduct)load();},[selProduct]);

  const saveAdj=async()=>{
    if(!adjQty||adjQty<1){setMsg({t:'e',m:ar?'الكمية يجب أن تكون أكبر من صفر':'Quantity must be > 0'});return;}
    setSaving(true);
    try{
      const res=await API.post('/inventory/stock-adjustment',{
        product_id:+selProduct,
        adjustment_qty:+adjQty,
        reason:adjReason||'Manual adjustment',
        type:adjType
      });
      const d=res.data;
      setMsg({t:'s',m:(ar?'تم تعديل المخزون: ':'Stock adjusted: ')+d.old_stock+' -> '+d.new_stock+' '+((data&&data.product&&data.product.unit)||'')});
      setShowAdj(false);setAdjQty(1);setAdjReason('');
      setProducts(prev=>prev.map(p=>String(p.id)===selProduct?{...p,stock_qty:d.new_stock}:p));
      load();
    }catch(e){setMsg({t:'e',m:(e.response&&e.response.data&&e.response.data.detail)||'Adjustment failed'});}
    finally{setSaving(false);setTimeout(()=>setMsg(null),5000);}
  };

  const prod=data&&data.product;
  const movements=(data&&data.movements)||[];
  const openingStock=(data&&data.opening_stock)||0;
  const closingStock=(data&&data.closing_stock)||0;
  const totalIn=(data&&data.total_in)||0;
  const totalOut=(data&&data.total_out)||0;
  const selProd=products.find(p=>String(p.id)===selProduct);

  return(
    <div style={{padding:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div>
          <h1 className="page-title">{ar?'بطاقة المخزون':'Stock Card'}</h1>
          <p className="page-sub">{ar?'حركة المخزون التفصيلية لكل منتج':'Detailed stock movement per product'}</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={()=>window.print()}>Print</button>
          <button className="btn btn-primary" onClick={()=>{setShowAdj(true);setMsg(null);}}>{ar?'+ تعديل مخزون':'+ Adjust Stock'}</button>
        </div>
      </div>
      {msg&&<div className={"alert alert-"+(msg.t==='s'?'success':'error')} style={{marginBottom:12}}>{msg.m}</div>}

      <div className="card" style={{padding:'16px 20px',marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:12,alignItems:'end'}}>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'#374151',display:'block',marginBottom:4}}>{ar?'المنتج':'Product'}</label>
            <select className="input" value={selProduct} onChange={e=>setSelProduct(e.target.value)}>
              <option value="">{ar?'اختر منتجاً':'Select product...'}</option>
              {products.map(p=>(
                <option key={p.id} value={p.id}>{p.sku} - {p.name} ({ar?'مخزون:':'Stock:'} {p.stock_qty} {p.unit})</option>
              ))}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'#374151',display:'block',marginBottom:4}}>{ar?'من تاريخ':'From'}</label>
            <input className="input" type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:'#374151',display:'block',marginBottom:4}}>{ar?'إلى تاريخ':'To'}</label>
            <input className="input" type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
          </div>
          <button className="btn btn-primary" onClick={load} disabled={loading||!selProduct}>
            {loading?'...':(ar?'عرض':'Show')}
          </button>
        </div>
        {selProd&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid #e2e8f0',display:'flex',gap:20,fontSize:12,color:'#64748b',flexWrap:'wrap'}}>
            <span>{ar?'الكود:':'SKU:'} <strong style={{color:'#0f172a'}}>{selProd.sku}</strong></span>
            <span>{ar?'الفئة:':'Category:'} <strong style={{color:'#0f172a'}}>{selProd.category||'-'}</strong></span>
            <span>{ar?'الوحدة:':'Unit:'} <strong style={{color:'#0f172a'}}>{selProd.unit}</strong></span>
            <span>{ar?'سعر البيع:':'Price:'} <strong style={{color:'#059669'}}>{SAR(selProd.price)}</strong></span>
            <span>{ar?'سعر التكلفة:':'Cost:'} <strong style={{color:'#dc2626'}}>{SAR(selProd.cost)}</strong></span>
            <span>{ar?'حد إعادة الطلب:':'Reorder Level:'} <strong style={{color:'#d97706'}}>{selProd.reorder_level} {selProd.unit}</strong></span>
          </div>
        )}
      </div>

      {prod&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:14}}>
            {[
              {l:ar?'الرصيد الافتتاحي':'Opening Stock',v:openingStock+' '+(prod.unit||''),c:'#2563eb'},
              {l:ar?'إجمالي الوارد':'Total In',v:totalIn+' '+(prod.unit||''),c:'#059669'},
              {l:ar?'إجمالي الصادر':'Total Out',v:totalOut+' '+(prod.unit||''),c:'#dc2626'},
              {l:ar?'الرصيد الختامي':'Closing Stock',v:closingStock+' '+(prod.unit||''),c:closingStock<=prod.reorder_level?'#dc2626':'#7c3aed'},
              {l:ar?'قيمة المخزون':'Stock Value',v:SAR(closingStock*(prod.cost||0)),c:'#0891b2'},
            ].map(s=>(
              <div key={s.l} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'12px 16px',borderLeft:'4px solid '+s.c}}>
                <p style={{fontSize:10,color:'#64748b',fontWeight:600,margin:0,textTransform:'uppercase'}}>{s.l}</p>
                <p style={{fontSize:16,fontWeight:800,color:s.c,margin:'4px 0 0'}}>{s.v}</p>
              </div>
            ))}
          </div>

          {closingStock<=prod.reorder_level&&(
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:18}}>!</span>
              <div>
                <p style={{margin:0,fontWeight:700,color:'#dc2626',fontSize:13}}>{ar?'تحذير: المخزون منخفض':'Warning: Low Stock'}</p>
                <p style={{margin:'2px 0 0',color:'#991b1b',fontSize:12}}>
                  {ar?('المخزون الحالي ('+closingStock+') أقل من حد إعادة الطلب ('+prod.reorder_level+')'):
                  ('Current stock ('+closingStock+') is at or below reorder level ('+prod.reorder_level+')')}
                </p>
              </div>
            </div>
          )}

          <div className="card" style={{overflow:'hidden'}}>
            <div style={{padding:'10px 16px',background:'#f8fafc',borderBottom:'1px solid #e2e8f0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:700,fontSize:13}}>{prod.sku} - {prod.name}</span>
              <span style={{fontSize:12,color:'#64748b'}}>{(data&&data.date_from)||''} {'->'} {(data&&data.date_to)||''}</span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr style={{background:'#f8fafc'}}>
                <th style={{padding:'9px 14px',textAlign:'left',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'التاريخ':'Date'}</th>
                <th style={{padding:'9px 14px',textAlign:'left',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'رقم الأمر':'Order #'}</th>
                <th style={{padding:'9px 14px',textAlign:'left',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'العميل':'Customer'}</th>
                <th style={{padding:'9px 14px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'وارد':'In'}</th>
                <th style={{padding:'9px 14px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'صادر':'Out'}</th>
                <th style={{padding:'9px 14px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'سعر الوحدة':'Unit Price'}</th>
                <th style={{padding:'9px 14px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الإجمالي':'Total'}</th>
                <th style={{padding:'9px 14px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الرصيد':'Balance'}</th>
                <th style={{padding:'9px 14px',textAlign:'center',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الحالة':'Status'}</th>
              </tr></thead>
              <tbody>
                <tr style={{background:'#f0fdf4',borderBottom:'1px solid #dcfce7'}}>
                  <td style={{padding:'7px 14px',color:'#166534',fontWeight:600,fontSize:12}}>{(data&&data.date_from)||'-'}</td>
                  <td colSpan={6} style={{padding:'7px 14px',color:'#166534',fontWeight:600,fontSize:12}}>{ar?'رصيد أول المدة':'Opening Balance'}</td>
                  <td style={{padding:'7px 14px',textAlign:'right',fontWeight:700,color:'#166534'}}>{openingStock} {prod.unit}</td>
                  <td></td>
                </tr>
                {loading?<tr><td colSpan={9} style={{padding:20,textAlign:'center',color:'#64748b'}}>{ar?'جارٍ التحميل...':'Loading...'}</td></tr>
                :movements.length===0?<tr><td colSpan={9} style={{padding:28,textAlign:'center',color:'#94a3b8'}}>{ar?'لا توجد حركات في هذه الفترة':'No movements in this period'}</td></tr>
                :movements.map((m,i)=>(
                  <tr key={i} style={{borderBottom:'1px solid #f1f5f9',background:i%2===0?'#fff':'#fafafa'}}>
                    <td style={{padding:'8px 14px',color:'#374151'}}>{m.date}</td>
                    <td style={{padding:'8px 14px',fontFamily:'monospace',color:'#2563eb',fontSize:11}}>{m.reference}</td>
                    <td style={{padding:'8px 14px',color:'#374151'}}>{m.customer}</td>
                    <td style={{padding:'8px 14px',textAlign:'right',color:'#059669',fontWeight:m.qty_in>0?600:400}}>{m.qty_in>0?m.qty_in+' '+prod.unit:'-'}</td>
                    <td style={{padding:'8px 14px',textAlign:'right',color:'#dc2626',fontWeight:m.qty_out>0?600:400}}>{m.qty_out>0?m.qty_out+' '+prod.unit:'-'}</td>
                    <td style={{padding:'8px 14px',textAlign:'right'}}>{SAR(m.unit_price)}</td>
                    <td style={{padding:'8px 14px',textAlign:'right',fontWeight:600}}>{SAR(m.total)}</td>
                    <td style={{padding:'8px 14px',textAlign:'right',fontWeight:700,color:(m.running_balance||0)<=prod.reorder_level?'#dc2626':'#0f172a'}}>{m.running_balance} {prod.unit}</td>
                    <td style={{padding:'8px 14px',textAlign:'center'}}>
                      <span className={"badge b-"+({pending:'yellow',confirmed:'blue',shipped:'purple',delivered:'green',cancelled:'red'}[m.status]||'gray')} style={{fontSize:10}}>{m.status}</span>
                    </td>
                  </tr>
                ))}
                <tr style={{background:'#f8fafc',borderTop:'2px solid #0f172a'}}>
                  <td colSpan={3} style={{padding:'10px 14px',fontWeight:800,fontSize:13}}>{ar?'رصيد آخر المدة':'Closing Balance'}</td>
                  <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'#059669'}}>{totalIn} {prod.unit}</td>
                  <td style={{padding:'10px 14px',textAlign:'right',fontWeight:700,color:'#dc2626'}}>{totalOut} {prod.unit}</td>
                  <td colSpan={2}></td>
                  <td style={{padding:'10px 14px',textAlign:'right',fontWeight:800,fontSize:14,color:closingStock<=prod.reorder_level?'#dc2626':'#059669'}}>{closingStock} {prod.unit}</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}

      {!prod&&!loading&&selProduct&&(
        <div className="card" style={{padding:36,textAlign:'center',color:'#94a3b8'}}>{ar?'اختر منتجاً وانقر عرض':'Select a product and click Show'}</div>
      )}
      {!selProduct&&products.length===0&&(
        <div className="card" style={{padding:36,textAlign:'center',color:'#94a3b8'}}>{ar?'لا توجد منتجات. أضف منتجات أولاً.':'No products. Add products first.'}</div>
      )}

      {showAdj&&(
        <Modal title={ar?'تعديل المخزون':'Stock Adjustment'} onClose={()=>setShowAdj(false)}>
          {prod&&<div style={{background:'#f8fafc',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13}}>
            <span style={{fontWeight:600}}>{prod.name}</span>
            <span style={{color:'#64748b',marginLeft:12}}>{ar?'المخزون الحالي:':'Current Stock:'} <strong style={{color:'#2563eb'}}>{prod.current_stock} {prod.unit}</strong></span>
          </div>}
          <div className="form-grid">
            <Field label={ar?'نوع التعديل':'Adjustment Type'}>
              <select className="input" value={adjType} onChange={e=>setAdjType(e.target.value)}>
                <option value="in">{ar?'إضافة للمخزون (وارد)':'Add to Stock (In)'}</option>
                <option value="out">{ar?'خصم من المخزون (صادر)':'Remove from Stock (Out)'}</option>
              </select>
            </Field>
            <Field label={ar?'الكمية':'Quantity'}>
              <input className="input" type="number" min="1" value={adjQty} onChange={e=>setAdjQty(+e.target.value)}/>
            </Field>
            <Field label={ar?'سبب التعديل':'Reason'} full>
              <input className="input" value={adjReason} onChange={e=>setAdjReason(e.target.value)}
                placeholder={ar?'مثال: جرد دوري، تلف، إرجاع بضاعة...':'e.g. Inventory count, damage, return...'}/>
            </Field>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-primary" onClick={saveAdj} disabled={saving}>
              {saving?(ar?'جارٍ الحفظ...':'Saving...'):(ar?'حفظ التعديل':'Save Adjustment')}
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowAdj(false)}>{ar?'إلغاء':'Cancel'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function PurchaseRequisitions(){
  const {ar}=useLang();
  const [rows,setRows]=useState([]);
  const [products,setProducts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showModal,setShowModal]=useState(false);
  const [form,setForm]=useState({product_id:'',requested_qty:1,preferred_vendor:'',expected_price:0,notes:'',urgency:'normal'});
  const [msg,setMsg]=useState(null);
  const [saving,setSaving]=useState(false);

  const load=()=>{
    setLoading(true);
    Promise.all([API.get('/inventory/requisitions'),API.get('/inventory/products')])
      .then(([r,p])=>{setRows(r.data||[]);setProducts(p.data||[]);})
      .catch(()=>{}).finally(()=>setLoading(false));
  };
  useEffect(()=>{load();},[]);

  const selProd=products.find(p=>String(p.id)===String(form.product_id));

  const save=async()=>{
    if(!form.product_id){setMsg({t:'e',m:ar?'اختر منتجاً':'Select a product'});return;}
    setSaving(true);
    try{
      const res=await API.post('/inventory/requisitions',{
        ...form,
        product_id:+form.product_id,
        expected_price:+form.expected_price||null,
        requested_qty:+form.requested_qty
      });
      setMsg({t:'s',m:(ar?'تم إنشاء طلب الشراء ':'Requisition ')+res.data.req_number+(ar?'':' created!')});
      setShowModal(false);
      setForm({product_id:'',requested_qty:1,preferred_vendor:'',expected_price:0,notes:'',urgency:'normal'});
      load();
    }catch(e){setMsg({t:'e',m:(e.response&&e.response.data&&e.response.data.detail)||'Failed'});}
    finally{setSaving(false);setTimeout(()=>setMsg(null),5000);}
  };

  const updateStatus=async(id,status)=>{
    try{await API.put('/inventory/requisitions/'+id+'/status?status='+status);load();}
    catch{alert('Failed');}
  };

  const delReq=async id=>{
    if(!confirm(ar?'حذف هذا الطلب؟':'Delete this requisition?'))return;
    try{await API.delete('/inventory/requisitions/'+id);load();}catch{alert('Failed');}
  };

  const urgencyColor={low:'b-gray',normal:'b-blue',high:'b-orange',urgent:'b-red'};
  const urgencyLabel={low:ar?'منخفضة':'Low',normal:ar?'عادية':'Normal',high:ar?'عالية':'High',urgent:ar?'عاجلة':'Urgent'};
  const statusColor={draft:'b-gray',pending:'b-yellow',approved:'b-green',ordered:'b-blue',received:'b-green',cancelled:'b-red'};
  const statusLabel={draft:ar?'مسودة':'Draft',pending:ar?'معلق':'Pending',approved:ar?'موافق':'Approved',ordered:ar?'مطلوب':'Ordered',received:ar?'مستلم':'Received',cancelled:ar?'ملغى':'Cancelled'};

  const lowStock=products.filter(p=>p.stock_qty<=p.reorder_level);
  const stats={total:rows.length,draft:rows.filter(r=>r.status==='draft').length,pending:rows.filter(r=>r.status==='pending').length,approved:rows.filter(r=>r.status==='approved').length};

  return(
    <div style={{padding:28}}>
      <div className="page-header">
        <div>
          <h1 className="page-title">{ar?'طلبات الشراء':'Purchase Requisitions'}</h1>
          <p className="page-sub">{rows.length} {ar?'طلب':'requisitions'}</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-secondary" onClick={()=>window.print()}>Print</button>
          <button className="btn btn-primary" onClick={()=>{setShowModal(true);setMsg(null);}}><Ic p={I.plus} s={14}/>{ar?'طلب شراء جديد':'New Requisition'}</button>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        {[
          {l:ar?'إجمالي الطلبات':'Total',v:stats.total,c:'#2563eb'},
          {l:ar?'مسودة':'Draft',v:stats.draft,c:'#64748b'},
          {l:ar?'معلق':'Pending',v:stats.pending,c:'#d97706'},
          {l:ar?'موافق عليه':'Approved',v:stats.approved,c:'#059669'},
        ].map(s=>(
          <div key={s.l} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'12px 16px',borderLeft:'4px solid '+s.c}}>
            <p style={{fontSize:11,color:'#64748b',fontWeight:600,margin:0}}>{s.l}</p>
            <p style={{fontSize:20,fontWeight:800,color:s.c,margin:'3px 0 0'}}>{s.v}</p>
          </div>
        ))}
      </div>

      {lowStock.length>0&&(
        <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:10,padding:'12px 16px',marginBottom:14}}>
          <p style={{margin:'0 0 8px',fontWeight:700,color:'#c2410c',fontSize:13}}>
            {lowStock.length} {ar?'منتجات تحتاج إعادة طلب:':'products need reorder:'}
          </p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {lowStock.map(p=>(
              <button key={p.id}
                style={{background:'#fee2e2',color:'#991b1b',border:'1px solid #fecaca',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:12,fontWeight:600}}
                onClick={()=>{
                  setForm(f=>({...f,product_id:String(p.id),requested_qty:Math.max(1,(p.reorder_level-p.stock_qty)+p.reorder_level)}));
                  setShowModal(true);
                }}>
                {p.name} ({p.stock_qty}/{p.reorder_level} {p.unit})
              </button>
            ))}
          </div>
        </div>
      )}

      {msg&&<div className={"alert alert-"+(msg.t==='s'?'success':'error')} style={{marginBottom:12}}>{msg.m}</div>}

      <div className="card" style={{overflow:'hidden'}}>
        {loading?<p style={{padding:20,color:'#64748b',fontSize:13}}>{ar?'جارٍ التحميل...':'Loading...'}</p>:(
          <table>
            <thead><tr>
              <th>{ar?'رقم الطلب':'Req #'}</th>
              <th>{ar?'المنتج':'Product'}</th>
              <th>{ar?'SKU':'SKU'}</th>
              <th style={{textAlign:'right'}}>{ar?'المخزون الحالي':'Current Stock'}</th>
              <th style={{textAlign:'right'}}>{ar?'الكمية المطلوبة':'Req Qty'}</th>
              <th>{ar?'المورد المفضل':'Vendor'}</th>
              <th style={{textAlign:'right'}}>{ar?'السعر المتوقع':'Est. Price'}</th>
              <th>{ar?'الأولوية':'Urgency'}</th>
              <th>{ar?'الحالة':'Status'}</th>
              <th>{ar?'الإجراءات':'Actions'}</th>
            </tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.id} style={{borderBottom:'1px solid #f1f5f9'}}>
                  <td style={{fontFamily:'monospace',fontWeight:600,color:'#2563eb',fontSize:11}}>{r.req_number}</td>
                  <td style={{fontWeight:500}}>{r.product_name}</td>
                  <td style={{fontFamily:'monospace',fontSize:11,color:'#64748b'}}>{r.product_sku}</td>
                  <td style={{textAlign:'right',fontWeight:600,color:(r.current_stock||0)<=(r.reorder_level||0)?'#dc2626':'#059669'}}>
                    {r.current_stock||0} {r.product_unit||''}
                  </td>
                  <td style={{textAlign:'right',fontWeight:700,color:'#2563eb'}}>{r.requested_qty} {r.product_unit||''}</td>
                  <td>{r.preferred_vendor||'-'}</td>
                  <td style={{textAlign:'right'}}>{r.expected_price?SAR(r.expected_price):'-'}</td>
                  <td><span className={"badge "+(urgencyColor[r.urgency]||'b-gray')} style={{fontSize:10}}>{urgencyLabel[r.urgency]||r.urgency}</span></td>
                  <td><span className={"badge "+(statusColor[r.status]||'b-gray')} style={{fontSize:10}}>{statusLabel[r.status]||r.status}</span></td>
                  <td>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {r.status==='draft'&&<button className="btn btn-sm" style={{background:'#dbeafe',color:'#1e40af',border:'none',cursor:'pointer',fontSize:11}} onClick={()=>updateStatus(r.id,'pending')}>{ar?'إرسال':'Submit'}</button>}
                      {r.status==='pending'&&<button className="btn btn-sm" style={{background:'#dcfce7',color:'#166534',border:'none',cursor:'pointer',fontSize:11}} onClick={()=>updateStatus(r.id,'approved')}>{ar?'موافقة':'Approve'}</button>}
                      {r.status==='pending'&&<button className="btn btn-sm" style={{background:'#fee2e2',color:'#991b1b',border:'none',cursor:'pointer',fontSize:11}} onClick={()=>updateStatus(r.id,'cancelled')}>{ar?'رفض':'Reject'}</button>}
                      {r.status==='approved'&&<button className="btn btn-sm" style={{background:'#ede9fe',color:'#6d28d9',border:'none',cursor:'pointer',fontSize:11}} onClick={()=>updateStatus(r.id,'ordered')}>{ar?'تم الطلب':'Ordered'}</button>}
                      {r.status==='ordered'&&<button className="btn btn-sm" style={{background:'#dcfce7',color:'#166534',border:'none',cursor:'pointer',fontSize:11}} onClick={()=>updateStatus(r.id,'received')}>{ar?'استلام':'Received'}</button>}
                      {(r.status==='draft'||r.status==='cancelled')&&<button className="btn btn-danger btn-sm" onClick={()=>delReq(r.id)}><Ic p={I.trash} s={11}/></button>}
                    </div>
                  </td>
                </tr>
              ))}
              {rows.length===0&&<tr><td colSpan={10} style={{textAlign:'center',color:'#94a3b8',padding:36}}>{ar?'لا توجد طلبات شراء':'No requisitions yet'}</td></tr>}
            </tbody>
          </table>
        )}
      </div>

      {showModal&&(
        <Modal title={ar?'طلب شراء جديد':'New Purchase Requisition'} onClose={()=>setShowModal(false)}>
          <div className="form-grid">
            <Field label={ar?'المنتج':'Product'} full>
              <select className="input" value={form.product_id} onChange={e=>setForm(p=>({...p,product_id:e.target.value}))}>
                <option value="">{ar?'اختر منتجاً...':'Select product...'}</option>
                {products.map(p=>(
                  <option key={p.id} value={p.id}>
                    {p.sku} - {p.name} ({ar?'مخزون:':'Stock:'} {p.stock_qty} {p.unit})
                  </option>
                ))}
              </select>
            </Field>

            {selProd&&(
              <div style={{gridColumn:'1/-1',background:'#f8fafc',borderRadius:8,padding:'10px 14px',fontSize:12,display:'flex',gap:20,flexWrap:'wrap'}}>
                <span>{ar?'المخزون الحالي:':'Current Stock:'} <strong style={{color:selProd.stock_qty<=selProd.reorder_level?'#dc2626':'#059669'}}>{selProd.stock_qty} {selProd.unit}</strong></span>
                <span>{ar?'حد الطلب:':'Reorder Level:'} <strong>{selProd.reorder_level} {selProd.unit}</strong></span>
                <span>{ar?'سعر التكلفة:':'Cost Price:'} <strong>{SAR(selProd.cost)}</strong></span>
                <span>{ar?'سعر البيع:':'Sale Price:'} <strong>{SAR(selProd.price)}</strong></span>
              </div>
            )}

            <Field label={ar?'الكمية المطلوبة':'Requested Qty'}>
              <input className="input" type="number" min="1" value={form.requested_qty} onChange={e=>setForm(p=>({...p,requested_qty:+e.target.value}))}/>
            </Field>
            <Field label={ar?'الأولوية':'Urgency'}>
              <select className="input" value={form.urgency} onChange={e=>setForm(p=>({...p,urgency:e.target.value}))}>
                <option value="low">{ar?'منخفضة':'Low'}</option>
                <option value="normal">{ar?'عادية':'Normal'}</option>
                <option value="high">{ar?'عالية':'High'}</option>
                <option value="urgent">{ar?'عاجلة - فورية':'Urgent'}</option>
              </select>
            </Field>
            <Field label={ar?'المورد المفضل':'Preferred Vendor'} full>
              <input className="input" value={form.preferred_vendor} onChange={e=>setForm(p=>({...p,preferred_vendor:e.target.value}))} placeholder={ar?'اسم المورد أو الشركة':'Vendor name or company'}/>
            </Field>
            <Field label={ar?'السعر المتوقع (ريال)':'Expected Unit Price (SAR)'}>
              <input className="input" type="number" min="0" value={form.expected_price} onChange={e=>setForm(p=>({...p,expected_price:+e.target.value}))}/>
            </Field>
            {form.expected_price>0&&form.requested_qty>0&&(
              <div style={{display:'flex',alignItems:'center',fontSize:12,color:'#64748b'}}>
                {ar?'الإجمالي المتوقع:':'Expected Total:'} <strong style={{marginLeft:6,color:'#0f172a'}}>{SAR(form.expected_price*form.requested_qty)}</strong>
              </div>
            )}
            <Field label={ar?'ملاحظات':'Notes'} full>
              <textarea className="input" rows={2} value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder={ar?'أي تفاصيل إضافية...':'Any additional details...'}/>
            </Field>
          </div>
          <div style={{display:'flex',gap:8,marginTop:16}}>
            <button className="btn btn-primary" onClick={save} disabled={saving}>
              {saving?(ar?'جارٍ الإنشاء...':'Creating...'):(ar?'إنشاء الطلب':'Create Requisition')}
            </button>
            <button className="btn btn-secondary" onClick={()=>setShowModal(false)}>{ar?'إلغاء':'Cancel'}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function InventoryReport(){
  const {ar}=useLang();
  const [products,setProducts]=useState([]);
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('all');

  useEffect(()=>{
    Promise.all([API.get('/inventory/products'),API.get('/inventory/orders')])
      .then(([p,o])=>{setProducts(p.data||[]);setOrders(o.data||[]);})
      .catch(()=>{}).finally(()=>setLoading(false));
  },[]);

  const filtered=filter==='low'?products.filter(p=>p.stock_qty<=p.reorder_level)
    :filter==='out'?products.filter(p=>p.stock_qty===0):products;

  const totalCost=products.reduce((a,p)=>a+(p.stock_qty*(p.cost||0)),0);
  const totalSale=products.reduce((a,p)=>a+(p.stock_qty*(p.price||0)),0);
  const catMap={};
  products.forEach(p=>{
    const c=p.category||'Uncategorized';
    if(!catMap[c])catMap[c]={count:0,qty:0,cost:0,sale:0};
    catMap[c].count++;catMap[c].qty+=p.stock_qty;
    catMap[c].cost+=p.stock_qty*(p.cost||0);catMap[c].sale+=p.stock_qty*(p.price||0);
  });

  return(
    <div style={{padding:28}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
        <div><h1 className="page-title">{ar?'تقرير المخزون':'Inventory Report'}</h1><p className="page-sub">{ar?'تقييم المخزون والحركة':'Stock valuation & movement'}</p></div>
        <button className="btn btn-secondary" onClick={()=>window.print()}>Print</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}}>
        {[
          {l:ar?'إجمالي المنتجات':'Total Products',v:products.length,c:'#2563eb'},
          {l:ar?'قيمة التكلفة':'Cost Value',v:SAR(totalCost),c:'#7c3aed'},
          {l:ar?'قيمة البيع':'Sale Value',v:SAR(totalSale),c:'#059669'},
          {l:ar?'هامش الربح':'Profit Margin',v:SAR(totalSale-totalCost),c:'#0891b2'},
          {l:ar?'منخفض المخزون':'Low Stock',v:products.filter(p=>p.stock_qty<=p.reorder_level).length,c:'#d97706'},
          {l:ar?'نفذ المخزون':'Out of Stock',v:products.filter(p=>p.stock_qty===0).length,c:'#dc2626'},
          {l:ar?'إجمالي الطلبات':'Total Orders',v:orders.length,c:'#2563eb'},
          {l:ar?'طلبات معلقة':'Pending Orders',v:orders.filter(o=>o.status==='pending').length,c:'#d97706'},
        ].map(s=>(
          <div key={s.l} style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'12px 16px',borderLeft:'4px solid '+s.c}}>
            <p style={{fontSize:10,color:'#64748b',fontWeight:600,margin:0}}>{s.l}</p>
            <p style={{fontSize:16,fontWeight:800,color:s.c,margin:'3px 0 0'}}>{s.v}</p>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:18,marginBottom:14}}>
        <p style={{fontSize:13,fontWeight:700,margin:'0 0 12px'}}>{ar?'حسب الفئة':'By Category'}</p>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{background:'#f8fafc'}}>
            <th style={{padding:'8px 12px',textAlign:'left',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الفئة':'Category'}</th>
            <th style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'المنتجات':'Items'}</th>
            <th style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الكمية':'Qty'}</th>
            <th style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'قيمة التكلفة':'Cost Value'}</th>
            <th style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'قيمة البيع':'Sale Value'}</th>
            <th style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#64748b',fontSize:11,borderBottom:'1px solid #e2e8f0'}}>{ar?'الهامش':'Margin'}</th>
          </tr></thead>
          <tbody>
            {Object.entries(catMap).sort((a,b)=>b[1].cost-a[1].cost).map(([cat,v])=>(
              <tr key={cat} style={{borderBottom:'1px solid #f1f5f9'}}>
                <td style={{padding:'8px 12px',fontWeight:500}}>{cat}</td>
                <td style={{padding:'8px 12px',textAlign:'right'}}>{v.count}</td>
                <td style={{padding:'8px 12px',textAlign:'right'}}>{v.qty}</td>
                <td style={{padding:'8px 12px',textAlign:'right'}}>{SAR(v.cost)}</td>
                <td style={{padding:'8px 12px',textAlign:'right'}}>{SAR(v.sale)}</td>
                <td style={{padding:'8px 12px',textAlign:'right',fontWeight:600,color:'#059669'}}>{SAR(v.sale-v.cost)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'10px 16px',background:'#f8fafc',borderBottom:'1px solid #e2e8f0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontWeight:700,fontSize:13}}>{ar?'قائمة المنتجات':'Products'}</span>
          <div style={{display:'flex',gap:6}}>
            {[['all',ar?'الكل':'All'],['low',ar?'منخفض':'Low'],['out',ar?'نفذ':'Out']].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(v)} style={{padding:'3px 10px',borderRadius:6,border:'1px solid #e2e8f0',cursor:'pointer',fontSize:11,fontWeight:600,background:filter===v?'#2563eb':'#fff',color:filter===v?'#fff':'#374151'}}>{l}</button>
            ))}
          </div>
        </div>
        {loading?<p style={{padding:20,color:'#64748b',fontSize:13}}>Loading...</p>:(
          <table>
            <thead><tr>
              <th>{ar?'المنتج':'Product'}</th><th>{ar?'SKU':'SKU'}</th><th>{ar?'الفئة':'Category'}</th>
              <th style={{textAlign:'right'}}>{ar?'المخزون':'Stock'}</th>
              <th style={{textAlign:'right'}}>{ar?'حد الطلب':'Min'}</th>
              <th style={{textAlign:'right'}}>{ar?'التكلفة':'Cost'}</th>
              <th style={{textAlign:'right'}}>{ar?'السعر':'Price'}</th>
              <th style={{textAlign:'right'}}>{ar?'قيمة المخزون':'Value'}</th>
              <th>{ar?'الحالة':'Status'}</th>
            </tr></thead>
            <tbody>
              {filtered.map(p=>(
                <tr key={p.id} style={{background:p.stock_qty===0?'#fef2f2':p.stock_qty<=p.reorder_level?'#fffbeb':'#fff',borderBottom:'1px solid #f1f5f9'}}>
                  <td style={{fontWeight:500}}>{p.name}</td>
                  <td style={{fontFamily:'monospace',fontSize:11,color:'#64748b'}}>{p.sku}</td>
                  <td>{p.category||'-'}</td>
                  <td style={{textAlign:'right',fontWeight:700,color:p.stock_qty===0?'#dc2626':p.stock_qty<=p.reorder_level?'#d97706':'#059669'}}>{p.stock_qty} {p.unit}</td>
                  <td style={{textAlign:'right',color:'#64748b'}}>{p.reorder_level}</td>
                  <td style={{textAlign:'right'}}>{SAR(p.cost)}</td>
                  <td style={{textAlign:'right'}}>{SAR(p.price)}</td>
                  <td style={{textAlign:'right',fontWeight:600}}>{SAR(p.stock_qty*(p.cost||0))}</td>
                  <td><span className={"badge "+(p.stock_qty===0?'b-red':p.stock_qty<=p.reorder_level?'b-yellow':'b-green')} style={{fontSize:10}}>{p.stock_qty===0?(ar?'نفذ':'Out'):p.stock_qty<=p.reorder_level?(ar?'منخفض':'Low'):(ar?'جيد':'OK')}</span></td>
                </tr>
              ))}
              {filtered.length===0&&<tr><td colSpan={9} style={{textAlign:'center',color:'#94a3b8',padding:28}}>{ar?'لا توجد منتجات':'No products'}</td></tr>}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

const nav=[
  {id:'dashboard',l:'Dashboard',icon:'home',sec:'Overview'},
  {id:'contacts',l:'Contacts',icon:'users',sec:'CRM'},
  {id:'leads',l:'Leads',icon:'trend',sec:'CRM'},
  {id:'deals',l:'Deals',icon:'check',sec:'CRM'},
  {id:'products',l:'Products',icon:'box',sec:'Inventory'},
  {id:'orders',l:'Sales Orders',icon:'cart',sec:'Inventory'},
  {id:'stock_card',l:'Stock Card',icon:'box',sec:'Inventory'},
  {id:'purchase_requisitions',l:'Purchase Requisitions',icon:'cart',sec:'Inventory'},
  {id:'inventory_report',l:'Inventory Report',icon:'box',sec:'Inventory'},
  {id:'invoices',l:'Invoices',icon:'file',sec:'Accounting'},
  {id:'transactions',l:'Transactions',icon:'dollar',sec:'Accounting'},
  {id:'employees',l:'Employees',icon:'person',sec:'HR & Payroll'},
  {id:'leaves',l:'Leave Requests',icon:'calendar',sec:'HR & Payroll'},
  {id:'payroll',l:'Payroll',icon:'dollar',sec:'HR & Payroll'},
  {id:'reports',l:'Reports',icon:'trend',sec:'Reports'},
  {id:'chart_of_accounts',l:'Chart of Accounts',icon:'file',sec:'Accounting'},
  {id:'journal_entries',l:'Journal Entries',icon:'file',sec:'Accounting'},
  {id:'financial_statements',l:'Financial Statements',icon:'dollar',sec:'Accounting'},
  {id:'ledger',l:'Ledger',icon:'file',sec:'Accounting'},
];

function getPage(id){
  const map={dashboard:<Dashboard/>,contacts:<Contacts/>,leads:<Leads/>,deals:<Deals/>,products:<Products/>,orders:<Orders/>,stock_card:<StockCard/>,purchase_requisitions:<PurchaseRequisitions/>,inventory_report:<InventoryReport/>,invoices:<Invoices/>,transactions:<Transactions/>,employees:<Employees/>,leaves:<Leaves/>,payroll:<Payroll/>,reports:<FullReports/>,chart_of_accounts:<ChartOfAccounts/>,journal_entries:<JournalEntries/>,financial_statements:<FinancialStatements/>,ledger:<LedgerPage/>};
  return map[id]||null;
}

/* ── App ── */
function App(){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('user')||'null');}catch{return null;}});
  const [page,setPage]=useState('dashboard');
  if(!localStorage.getItem('api_url')){localStorage.setItem('api_url','https://knooz-production.up.railway.app');}
  const hasUrl=!!localStorage.getItem('api_url');
  const {ar}=useLang();
  const navT=s=>(ar&&AR[s])||s;
  const navItems=nav.map(n=>({...n,l:navT(n.l),sec:navT(n.sec)}));
  const sections=[...new Set(navItems.map(n=>n.sec))];

  if(!hasUrl) return <SetupScreen onDone={()=>window.location.reload()}/>;
  if(!user) return <Login onLogin={u=>setUser(u)}/>;
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <div className="sidebar">
        <div className="logo">
          <div className="logo-icon">K</div>
          <div><div style={{fontWeight:800,color:'#f1f5f9',fontSize:14}}>Knooz ERP</div><div style={{fontSize:10,color:'#475569',marginTop:1}}>Business Suite</div></div>
        </div>
        <nav style={{flex:1,padding:'8px 0',overflowY:'auto'}}>
          {sections.map(sec=>(
            <div key={sec}>
              <div className="nav-section">{sec}</div>
              {navItems.filter(n=>n.sec===sec).map(n=>(
                <div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
                  <Ic p={I[n.icon]} s={14}/>{n.l}
                </div>
              ))}
            </div>
          ))}
        </nav>
        <div style={{padding:'12px 16px',borderTop:'1px solid #1e293b'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:32,height:32,background:'linear-gradient(135deg,#2563eb,#7c3aed)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:'#fff',flexShrink:0}}>
              {user.full_name?.charAt(0).toUpperCase()}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.full_name}</div>
              <div style={{fontSize:10,color:'#475569',textTransform:'capitalize'}}>{user.role}</div>
            </div>
            <LangToggle/>
            <div style={{cursor:'pointer',color:'#475569'}} title="Sign out" onClick={()=>{localStorage.clear();window.location.reload();}}>
              <Ic p={I.logout} s={15}/>
            </div>
          </div>
        </div>
      </div>
      <main style={{flex:1,overflowY:'auto'}}>{getPage(page)}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LangProvider><App/></LangProvider>);
</script>
</body>
</html>
